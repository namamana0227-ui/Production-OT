<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SIGNMASTR OT Photo Upload</title>
  <style>
    :root{--orange:#b84a16;--deep:#54200d;--paper:#fff4eb;--line:#edc7af;--muted:#815d4c}*{box-sizing:border-box}body{margin:0;background:#f8e0d0;color:var(--deep);font-family:Arial,sans-serif}.bar{background:#6b2b12;color:#fff;padding:19px max(20px,calc((100% - 760px)/2));font-weight:800;font-size:20px}.bar small{display:block;color:#ffc49d;font-size:11px;letter-spacing:1px;margin-top:4px}.page{width:min(760px,calc(100% - 28px));margin:28px auto}.card{background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:19px;margin-bottom:14px}h1{font-size:27px;margin:0 0 8px}p{color:var(--muted);line-height:1.45}.notice{padding:11px 12px;background:#ffeadc;border-radius:7px;font-size:13px;color:#7d391d;margin:18px 0}.job{display:flex;justify-content:space-between;gap:18px;align-items:center}.job h2{margin:0 0 8px;font-size:17px}.info{font-size:13px;line-height:1.55}.muted{color:var(--muted)}.photo-input{position:absolute;width:1px;height:1px;opacity:0}.photo-button{display:inline-block;background:var(--orange);color:#fff;padding:11px 13px;border-radius:7px;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap}.view-button{border:0;background:#f7dfcf;color:#8a3515;border-radius:7px;padding:10px 12px;font-size:12px;font-weight:800;cursor:pointer;margin:8px 0 0}.uploaded-gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;border-top:1px solid var(--line);margin-top:16px;padding-top:16px}.uploaded-gallery a{display:block}.uploaded-gallery img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;border:1px solid var(--line)}.hidden{display:none}.empty{text-align:center;color:var(--muted)}@media(max-width:560px){.job{display:block}.photo-button{margin-top:14px}.uploaded-gallery{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
  <header class="bar">SIGNMASTR<small>OT PHOTO UPLOAD</small></header>
  <main class="page">
    <section class="card"><h1>Upload completed-work photo</h1><p>Choose the OT date first, then find the correct job and upload your photo.</p><div class="notice">Upload photos only for work you have completed. Each photo must be smaller than 5 MB.</div><div class="date-filter"><label for="jobDate">OT date</label><input id="jobDate" type="date" onchange="loadJobs()"></div></section>
    <div id="jobs"><section class="card empty">Loading OT jobs...</section></div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const database=supabase.createClient('https://pthvibwnyvlszmprfdit.supabase.co','sb_publishable_1UBB53SrLHpMhlrquuIOkw_4WtXsdE6');
    const safe=value=>{const node=document.createElement('div');node.textContent=value||'';return node.innerHTML};
    document.getElementById('jobDate').value=new Date().toISOString().slice(0,10);
    async function uploadPhoto(id,input){
      const file=input.files[0];if(!file)return;
      if(!file.type.startsWith('image/')){alert('Please select an image file.');return;}
      if(file.size>5*1024*1024){alert('Photo must be smaller than 5 MB.');return;}
      input.disabled=true;
      const {data:request,error:requestError}=await database.from('production_ot_requests').select('photo_urls').eq('id',id).single();
      if(requestError){alert(requestError.message);input.disabled=false;return;}
      const fileName=id+'/'+Date.now()+'-'+file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
      const upload=await database.storage.from('production-ot-photos').upload(fileName,file);
      if(upload.error){alert(upload.error.message);input.disabled=false;return;}
      const url=database.storage.from('production-ot-photos').getPublicUrl(fileName).data.publicUrl;
      const update=await database.from('production_ot_requests').update({photo_urls:[...(request.photo_urls||[]),url]}).eq('id',id);
      if(update.error){alert(update.error.message);input.disabled=false;return;}
      alert('Photo uploaded successfully.');loadJobs();
    }
    window.toggleUploadedPhotos=id=>{
      const gallery=document.getElementById('uploaded-photos-'+id);
      if(gallery)gallery.classList.toggle('hidden');
    };
    async function loadJobs(){
      const selectedDate=document.getElementById('jobDate').value;
      let query=database.from('production_ot_requests').select('*').neq('status','Rejected').order('submitted_at',{ascending:false});
      if(selectedDate)query=query.eq('ot_date',selectedDate);
      const {data,error}=await query;
      if(error){document.getElementById('jobs').innerHTML='<section class="card empty">Cannot load OT jobs. Please refresh.</section>';return;}
      document.getElementById('jobs').innerHTML=data.length?data.map(item=>{
        const id='photo-'+item.id,project=item.project_name||'No project name',date=item.ot_date||'OT date not set',time=item.timeline||'OT time not set',photoUrls=item.photo_urls||[],photos=photoUrls.length;
        const photoGallery=photos?'<button class="view-button" onclick="toggleUploadedPhotos('+item.id+')">View uploaded photos ('+photos+')</button><div class="uploaded-gallery hidden" id="uploaded-photos-'+item.id+'">'+photoUrls.map((url,index)=>'<a href="'+url+'" target="_blank" title="Open full photo"><img src="'+url+'" alt="Uploaded work photo '+(index+1)+'"></a>').join('')+'</div>':'<span class="muted">No photos uploaded yet</span>';
        return '<section class="card"><div class="job"><div><h2>'+safe(project)+'</h2><div class="info"><b>OT date:</b> '+safe(date)+'<br><b>Department:</b> '+safe(item.department)+'<br><b>Workers:</b> '+safe((item.workers||[]).join(', '))+'<br><b>OT time:</b> '+safe(time)+'<br><span class="muted">'+photos+' photo(s) uploaded</span></div></div><div><label class="photo-button" for="'+id+'-camera">📷 Take photo</label><input class="photo-input" id="'+id+'-camera" type="file" accept="image/*" capture="environment" onchange="uploadPhoto('+item.id+',this)"><label class="photo-button gallery-button" for="'+id+'-gallery">🖼 Upload photo</label><input class="photo-input" id="'+id+'-gallery" type="file" accept="image/*" onchange="uploadPhoto('+item.id+',this)"></div></div>'+photoGallery+'</section>';
      }).join(''):'<section class="card empty">No active OT jobs found for the selected date.</section>';
    }
    loadJobs();
  </script>
<style>
  :root{--orange:#f89521;--deep:#253746;--paper:#fffaf3;--line:#f4c98f}
  body{background:#fff0d8}.bar{background:#f89521!important;color:#253746!important}.bar small{color:#253746!important}.photo-button{background:#f89521!important;margin:0 0 8px}.gallery-button{background:#253746!important}.signmastr-logo{display:block;width:150px;height:auto;background:#fff;border-radius:6px;padding:4px}.date-filter{display:grid;gap:6px;max-width:260px;font-size:13px;font-weight:800}.date-filter input{padding:10px;border:1px solid var(--line);border-radius:7px;font:inherit;background:#fff}
</style>
<script>document.querySelector('.bar').innerHTML='<img class="signmastr-logo" src="signmastr-logo.png" alt="SIGNMASTR"><small>OT PHOTO UPLOAD</small>';</script>
</body>
</html>
