<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SIGNMASTR Production OT Request</title>
  <style>
    :root{--orange:#b84a16;--deep:#54200d;--paper:#fff4eb;--line:#edc7af;--muted:#815d4c}*{box-sizing:border-box}body{margin:0;background:#f3c8ab;color:var(--deep);font-family:Arial,sans-serif}.bar{background:var(--orange);color:#fff;padding:18px max(22px,calc((100% - 680px)/2));font-size:19px;font-weight:800}.page{width:min(620px,calc(100% - 32px));margin:35px auto}.card{background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:24px}h1{font-size:26px;margin:0 0 7px}p{color:var(--muted);line-height:1.45}.notice{padding:11px 12px;background:#ffeadc;border-radius:7px;font-size:12px;color:#7d391d;margin:18px 0}.field{display:grid;gap:6px;margin-top:15px}label{font-weight:700;font-size:13px}select,textarea{border:1px solid #dba886;border-radius:7px;padding:11px;background:#fff;font:inherit;color:var(--deep)}textarea{min-height:84px;resize:vertical}.workers{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;background:#fffaf6;border:1px solid #efd7c7;padding:12px;border-radius:7px}.worker{display:flex;gap:8px;align-items:center;font-size:13px}.worker input{accent-color:var(--orange)}button{width:100%;margin-top:22px;border:0;border-radius:7px;background:var(--orange);color:#fff;padding:12px;font-weight:800;font-size:14px;cursor:pointer}.empty{font-size:13px;color:var(--muted);grid-column:1/-1}.success{display:none;text-align:center;padding:25px}.success h2{margin:0 0 7px}@media(max-width:450px){.workers{grid-template-columns:1fr}}
  </style>
</head>
<body><header class="bar">SIGNMASTR · Production OT</header><main class="page"><section class="card" id="formCard"><h1>Production overtime request</h1><p>Production supervisors and leads can submit OT requests for their crews.</p><div class="notice">Select the department first, then choose the production workers who will work overtime.</div><form id="form"><div class="field"><label for="requester">Requested by</label><select id="requester"><option value="Siew Li|Production Supervisor">Siew Li — Production Supervisor</option><option value="ST|Production Lead">ST — Production Lead</option></select></div><div class="field"><label for="department">Department</label><select id="department" required onchange="renderWorkers()"></select></div><div class="field"><label>Workers going for OT</label><div class="workers" id="workers"></div></div><button>Submit OT request</button></form></section><section class="card success" id="success"><h2>✓ Request submitted</h2><p>The production OT request is now pending approval.</p><button onclick="location.reload()">Submit another request</button></section></main>
  <script>
    const defaultTeams={'LED / Neon / Sticker':['Shahin','Akhta','Mahmon','Kurban','Melon','Husaini'],'Assembly':['Rana','Saddam','Rasel'],'Spray & Paint':['Summon'],'Welding':['Abang Din','Hafizul'],'3D Lettering Box-up':[]};
    const teams=JSON.parse(localStorage.getItem('signmastr-production-teams')||'null')||defaultTeams;
    const department=document.getElementById('department');department.innerHTML=Object.keys(teams).map(name=>`<option>${name}</option>`).join('');
    function renderWorkers(){const names=teams[department.value]||[];document.getElementById('workers').innerHTML=names.length?names.map(name=>`<label class="worker"><input type="checkbox" value="${name}"> ${name}</label>`).join(''):'<div class="empty">No workers added yet. Add workers in the Production Team page.</div>'}
    function esc(value){const item=document.createElement('div');item.textContent=value;return item.innerHTML}
    document.getElementById('form').onsubmit=event=>{event.preventDefault();const workers=[...document.querySelectorAll('#workers input:checked')].map(input=>input.value);if(!workers.length){alert('Select at least one production worker.');return}const [requester,requesterRole]=document.getElementById('requester').value.split('|');const requests=JSON.parse(localStorage.getItem('signmastr-production-ot')||'null')||[];requests.push({id:Date.now(),submittedAt:new Date().toLocaleString('en-MY'),requester,requesterRole,department:department.value,workers,reason:'',status:'Pending'});localStorage.setItem('signmastr-production-ot',JSON.stringify(requests));document.getElementById('formCard').style.display='none';document.getElementById('success').style.display='block'};renderWorkers();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const database=supabase.createClient('https://pthvibwnyvlszmprfdit.supabase.co','sb_publishable_1UBB53SrLHpMhlrquuIOkw_4WtXsdE6');
    let remoteTeams={};
    async function loadRemoteTeams(){
      const {data,error}=await database.from('production_teams').select('*').order('department').order('worker_name');
      if(error){alert('Cannot load worker names. Please check the internet connection.');return}
      remoteTeams=JSON.parse(JSON.stringify(defaultTeams));data.forEach(row=>{(remoteTeams[row.department]??=[]).push(row.worker_name)});
      department.innerHTML=Object.keys(remoteTeams).map(name=>`<option>${esc(name)}</option>`).join('');
      renderRemoteWorkers();
    }
    function renderRemoteWorkers(){
      const names=remoteTeams[department.value]||[];
      document.getElementById('workers').innerHTML=names.length?names.map(name=>`<label class="worker"><input type="checkbox" value="${esc(name)}"> ${esc(name)}</label>`).join(''):'<div class="empty">No workers added yet. Add workers in the Production Team page.</div>';
    }
    department.onchange=renderRemoteWorkers;
    document.getElementById('form').onsubmit=async event=>{
      event.preventDefault();
      const workers=[...document.querySelectorAll('#workers input:checked')].map(input=>input.value);
      if(!workers.length){alert('Select at least one production worker.');return}
      const [requester,requesterRole]=document.getElementById('requester').value.split('|');
      const button=document.querySelector('#form button');button.disabled=true;button.textContent='Sending...';
      const otStart=document.getElementById('otStart').value,otEnd=document.getElementById('otEnd').value;
      if(!otStart||!otEnd){alert('Please select OT start time and OT end time.');button.disabled=false;button.textContent='Submit OT request';return}
      const {error}=await database.from('production_ot_requests').insert({requester,requester_role:requesterRole,department:department.value,workers,reason:'',project_name:document.getElementById('projectName').value.trim(),timeline:otStart+' - '+otEnd,status:'Pending'});
      if(error){alert(error.message);button.disabled=false;button.textContent='Submit OT request';return}
      document.getElementById('formCard').style.display='none';document.getElementById('success').style.display='block';
    };
    document.head.insertAdjacentHTML('beforeend','<style>input{border:1px solid #dba886;border-radius:7px;padding:11px;background:#fff;font:inherit;color:#54200d}</style>');
    document.querySelector('#workers').closest('.field').insertAdjacentHTML('afterend','<div class="field"><label for="projectName">Project / job name <small>(optional)</small></label><input id="projectName" placeholder="Example: Luckin KLCC signage"></div><div class="field"><label for="otStart">OT start time</label><select id="otStart"></select></div><div class="field"><label for="otEnd">OT end time</label><select id="otEnd"></select></div>');
    const timeOptions=['<option value="">Select time</option>'];for(let hour=0;hour<24;hour++){for(let minute=0;minute<60;minute+=30){const value=String(hour).padStart(2,'0')+':'+String(minute).padStart(2,'0');timeOptions.push('<option value="'+value+'">'+value+'</option>')}}document.getElementById('otStart').innerHTML=timeOptions.join('');document.getElementById('otEnd').innerHTML=timeOptions.join('');
    loadRemoteTeams();
  </script>
</body></html>
