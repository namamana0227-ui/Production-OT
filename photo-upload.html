<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SIGNMASTR OT Photo Upload</title>
  <style>
    :root{--orange:#b84a16;--deep:#54200d;--paper:#fff4eb;--line:#edc7af;--muted:#815d4c}*{box-sizing:border-box}body{margin:0;background:#f8e0d0;color:var(--deep);font-family:Arial,sans-serif}.bar{background:#6b2b12;color:#fff;padding:19px max(20px,calc((100% - 760px)/2));font-weight:800;font-size:20px}.bar small{display:block;color:#ffc49d;font-size:11px;letter-spacing:1px;margin-top:4px}.page{width:min(760px,calc(100% - 28px));margin:28px auto}.card{background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:19px;margin-bottom:14px}h1{font-size:27px;margin:0 0 8px}p{color:var(--muted);line-height:1.45}.notice{padding:11px 12px;background:#ffeadc;border-radius:7px;font-size:13px;color:#7d391d;margin:18px 0}.job{display:flex;justify-content:space-between;gap:18px;align-items:center}.job h2{margin:0 0 8px;font-size:17px}.info{font-size:13px;line-height:1.55}.muted{color:var(--muted)}.photo-input{position:absolute;width:1px;height:1px;opacity:0}.photo-button{display:inline-block;background:var(--orange);color:#fff;padding:11px 13px;border-radius:7px;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap}.empty{text-align:center;color:var(--muted)}@media(max-width:560px){.job{display:block}.photo-button{margin-top:14px}}
  </style>
</head>
<body>
  <header class="bar">SIGNMASTR<small>OT PHOTO UPLOAD</small></header>
  <main class="page">
    <section class="card"><h1>Upload completed-work photo</h1><p>Choose the correct OT job, then tap <b>Take photo</b>. Your phone camera will open.</p><div class="notice">Upload photos only for work you have completed. Each photo must be smaller than 5 MB.</div></section>
    <div id="jobs"><section class="card empty">Loading OT jobs...</section></div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const database=supabase.createClient('https://pthvibwnyvlszmprfdit.supabase.co','sb_publishable_1UBB53SrLHpMhlrquuIOkw_4WtXsdE6');
    const safe=value=>{const node=document.createElement('div');node.textContent=value||'';return node.innerHTML};
    async function uploadPhoto(id,input){
      const file=input.files[0];if(!file)return;
      if(!file.type.startsWith('image/')){alert('Please select an image file.');return;}
      if(file.size>5*1024*1024){alert('Photo must be smaller than 5 MB.');return;}
      input.disabled=true;
      const {data:request,error:requestError}=await database.from('production_ot_requests').select('photo_urls').eq('id',id).single();
      if(requestError){alert(requestError.message);input.disabled=false;return;}
      const fileName=id+'/'+Date.now()+'-'+file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
      const upload=await database.storage.from('production-ot-photos').upload(fileName,file);
      if(upload.error){alert(upload.error.message);input.disabled=false;return;}
      const url=database.storage.from('production-ot-photos').getPublicUrl(fileName).data.publicUrl;
      const update=await database.from('production_ot_requests').update({photo_urls:[...(request.photo_urls||[]),url]}).eq('id',id);
      if(update.error){alert(update.error.message);input.disabled=false;return;}
      alert('Photo uploaded successfully.');loadJobs();
    }
    async function loadJobs(){
      const {data,error}=await database.from('production_ot_requests').select('*').neq('status','Rejected').order('submitted_at',{ascending:false});
      if(error){document.getElementById('jobs').innerHTML='<section class="card empty">Cannot load OT jobs. Please refresh.</section>';return;}
      document.getElementById('jobs').innerHTML=data.length?data.map(item=>{
        const id='photo-'+item.id,project=item.project_name||'No project name',time=item.timeline||'OT time not set',photos=(item.photo_urls||[]).length;
        return '<section class="card"><div class="job"><div><h2>'+safe(project)+'</h2><div class="info"><b>Department:</b> '+safe(item.department)+'<br><b>Workers:</b> '+safe((item.workers||[]).join(', '))+'<br><b>OT time:</b> '+safe(time)+'<br><span class="muted">'+photos+' photo(s) uploaded</span></div></div><div><label class="photo-button" for="'+id+'">📷 Take photo</label><input class="photo-input" id="'+id+'" type="file" accept="image/*" capture="environment" onchange="uploadPhoto('+item.id+',this)"></div></div></section>';
      }).join(''):'<section class="card empty">No active OT jobs found.</section>';
    }
    loadJobs();
  </script>
</body>
</html>
