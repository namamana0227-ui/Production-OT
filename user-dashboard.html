<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SIGNMASTR Production OT</title>
  <style>
    :root{--orange:#b84a16;--deep:#54200d;--paper:#fff4eb;--line:#edc7af;--muted:#815d4c}*{box-sizing:border-box}body{margin:0;background:#f8e0d0;color:var(--deep);font-family:Arial,sans-serif}.bar{background:#6b2b12;color:#fff;padding:19px max(20px,calc((100% - 980px)/2));font-weight:800;font-size:20px}.bar small{display:block;color:#ffc49d;font-size:11px;letter-spacing:1px;margin-top:4px}.page{width:min(980px,calc(100% - 32px));margin:34px auto}.top{display:flex;justify-content:space-between;align-items:start;gap:20px}.eyebrow{color:var(--orange);font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase}.top h1{margin:6px 0;font-size:28px}.top p{margin:0;color:var(--muted)}.button{display:inline-block;background:var(--orange);color:#fff;padding:12px 16px;border-radius:7px;text-decoration:none;font-weight:800;white-space:nowrap}.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin:25px 0}.metric,.card{background:var(--paper);border:1px solid var(--line);border-radius:11px}.metric{padding:18px}.metric label{font-size:11px;font-weight:800;letter-spacing:.7px;color:var(--muted);text-transform:uppercase}.metric b{display:block;font-size:30px;margin-top:7px}.card{overflow:hidden}.card h2{margin:0;padding:19px 20px;font-size:18px}.table{overflow:auto}table{border-collapse:collapse;width:100%;background:#fff;font-size:13px}th{text-align:left;padding:11px 16px;background:#f9eadf;color:var(--muted);font-size:10px;text-transform:uppercase}td{padding:13px 16px;border-top:1px solid #f5e6dc}.badge{font-size:10px;font-weight:800;border-radius:18px;padding:4px 7px}.pending{background:#fff1d5;color:#9c5a00}.approved{background:#e1f5e9;color:#126b40}.rejected{background:#fae4e2;color:#a22c24}.empty{color:var(--muted)}@media(max-width:600px){.top{display:block}.button{margin-top:17px}.metrics{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header class="bar">SIGNMASTR<small>Production OT</small></header>
  <main class="page">
    <div class="top"><div><div class="eyebrow">Production portal</div><h1>Overtime dashboard</h1><p>View current OT requests and submit a new request.</p></div><div><button class="button" onclick="exportDashboardCsv()">Export CSV</button> <button class="button" onclick="openUserTeamManager()">Manage production team</button> <a class="button" href="production-request.html">Open request form</a></div></div>
    <section class="metrics"><div class="metric"><label>Pending requests</label><b id="pending">0</b></div><div class="metric"><label>Approved OT</label><b id="approved">0</b></div><div class="metric"><label>Workers requested</label><b id="workers">0</b></div></section>
    <section class="card"><h2>Recent OT requests</h2><div class="table"><table><thead><tr><th>Requester</th><th>Department</th><th>Workers</th><th>Status</th><th>Take / upload photo</th><th>Photos</th></tr></thead><tbody id="rows"><tr><td colspan="6">Loading requests...</td></tr></tbody></table></div></section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const database=supabase.createClient('https://pthvibwnyvlszmprfdit.supabase.co','sb_publishable_1UBB53SrLHpMhlrquuIOkw_4WtXsdE6');
    const safe=value=>{const node=document.createElement('div');node.textContent=value||'';return node.innerHTML};
    const badge=status=>`<span class="badge ${status.toLowerCase()}">${status}</span>`;
    async function uploadPhotos(id,input){const files=[...input.files];if(!files.length)return;input.disabled=true;for(const file of files){if(!file.type.startsWith('image/')){alert('Please select image files only.');input.disabled=false;return}if(file.size>5*1024*1024){alert('Each photo must be smaller than 5 MB.');input.disabled=false;return}}const {data:request,error:requestError}=await database.from('production_ot_requests').select('photo_urls').eq('id',id).single();if(requestError){alert(requestError.message);input.disabled=false;return}const urls=[...(request.photo_urls||[])];for(const file of files){const fileName=`${id}/${Date.now()}-${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;const {error}=await database.storage.from('production-ot-photos').upload(fileName,file);if(error){alert(error.message);input.disabled=false;return}urls.push(database.storage.from('production-ot-photos').getPublicUrl(fileName).data.publicUrl)}const {error}=await database.from('production_ot_requests').update({photo_urls:urls}).eq('id',id);if(error){alert(error.message);input.disabled=false;return}alert('Photo uploaded.');await loadDashboard()}
    async function loadDashboard(){const {data,error}=await database.from('production_ot_requests').select('*').order('submitted_at',{ascending:false});if(error){document.getElementById('rows').innerHTML='<tr><td colspan="7" class="empty">Cannot load requests. Please refresh.</td></tr>';return}document.getElementById('pending').textContent=data.filter(item=>item.status==='Pending').length;document.getElementById('approved').textContent=data.filter(item=>item.status==='Approved').length;document.getElementById('workers').textContent=data.reduce((total,item)=>total+(item.workers||[]).length,0);document.getElementById('rows').innerHTML=data.length?data.slice(0,8).map(item=>{const photos=item.photo_urls||[];return `<tr><td>${safe(item.requester)}</td><td>${safe(item.department)}</td><td>${safe((item.workers||[]).join(', '))}</td><td>${safe(item.reason)}</td><td>${badge(item.status)}</td><td><input type="file" accept="image/*" multiple onchange="uploadPhotos(${item.id},this)"></td><td>${photos.length?photos.map((url,index)=>`<a href="${url}" target="_blank">Photo ${index+1}</a>`).join('<br>'):'No photos yet'}</td></tr>`}).join(''):'<tr><td colspan="7" class="empty">No production OT requests yet.</td></tr>'}
    loadDashboard();
  </script>
<style>
  .photo-input{position:absolute;width:1px;height:1px;opacity:0}
  .photo-button{display:inline-block;background:#f7dfcf;color:#8a3515;padding:8px 10px;border-radius:6px;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap}.gallery-button{margin-left:4px;background:#253746;color:#fff}
</style>
<script>
  // Replace the user table: no OT reason, and phone camera support.
  let dashboardRequests=[];
  async function loadDashboard(){
    const result=await database.from('production_ot_requests').select('*').order('submitted_at',{ascending:false});
    const data=result.data,error=result.error;
    if(error){document.getElementById('rows').innerHTML='<tr><td colspan="6" class="empty">Cannot load requests. Please refresh.</td></tr>';return;}
    dashboardRequests=data;
    document.getElementById('pending').textContent=data.filter(item=>item.status==='Pending').length;
    document.getElementById('approved').textContent=data.filter(item=>item.status==='Approved').length;
    document.getElementById('workers').textContent=data.reduce((total,item)=>total+(item.workers||[]).length,0);
    document.querySelector('.card thead').innerHTML='<tr><th>Requester</th><th>Department</th><th>Workers</th><th>Status</th><th>Take / upload photo</th><th>Photos</th></tr>';
    document.getElementById('rows').innerHTML=data.length?data.slice(0,8).map(item=>{
      const photos=item.photo_urls||[],inputId='photo-'+item.id;
      const photoLinks=photos.length?photos.map((url,index)=>'<a href="'+url+'" target="_blank">Photo '+(index+1)+'</a>').join('<br>'):'No photos yet';
      return '<tr><td>'+safe(item.requester)+'</td><td>'+safe(item.department)+'</td><td>'+safe((item.workers||[]).join(', '))+'</td><td>'+badge(item.status)+'</td><td><label class="photo-button" for="'+inputId+'-camera">📷 Take photo</label><input class="photo-input" id="'+inputId+'-camera" type="file" accept="image/*" capture="environment" onchange="uploadPhotos('+item.id+',this)"><label class="photo-button gallery-button" for="'+inputId+'-gallery">🖼 Upload photo</label><input class="photo-input" id="'+inputId+'-gallery" type="file" accept="image/*" onchange="uploadPhotos('+item.id+',this)"></td><td>'+photoLinks+'</td></tr>';
    }).join(''):'<tr><td colspan="6" class="empty">No production OT requests yet.</td></tr>';
  }
  function exportDashboardCsv(){
    const headings=['Submitted at','OT date','Requester','Department','Workers','Status','Project / job name','Project PIC','OT time','Photo links'];
    const rows=dashboardRequests.map(item=>[item.submitted_at||'',item.ot_date||'',item.requester||'',item.department||'',(item.workers||[]).join(', '),item.status||'',item.project_name||'',item.project_pic||'',item.timeline||'',(item.photo_urls||[]).join(' | ')]);
    const csv=[headings,...rows].map(row=>row.map(value=>'"'+String(value).replaceAll('"','""')+'"').join(',')).join('\n');
    const link=document.createElement('a');link.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));link.download='signmastr-production-ot.csv';link.click();URL.revokeObjectURL(link.href);
  }
  loadDashboard();
</script>
<style>.hidden{display:none!important}.edit-input{width:100%;padding:10px;border:1px solid #dba886;border-radius:7px;background:#fff;font:inherit;color:#54200d}.edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}.edit-grid label{display:grid;gap:5px;font-size:12px;font-weight:800;color:#815d4c}.edit-grid .wide{grid-column:1/-1}.edit-save{border:0;background:#b84a16;color:#fff;border-radius:7px;padding:12px;width:100%;font-weight:800;margin-top:18px;cursor:pointer}.edit-modal{position:fixed;inset:0;background:#40160688;display:grid;place-items:center;padding:18px;z-index:20}.edit-box{background:#fff4eb;border-radius:12px;padding:22px;width:min(520px,100%);max-height:calc(100vh - 36px);overflow:auto}.edit-top{display:flex;justify-content:space-between;align-items:center}.edit-top h2{margin:0}.edit-close{border:0;background:#f0d5c4;border-radius:50%;width:30px;height:30px;font-size:18px;cursor:pointer}.team-picker{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;border:1px solid #edc7af;background:#fff;padding:10px;border-radius:7px}.team-picker label{display:flex;align-items:center;gap:6px;font-size:12px;color:#54200d}.photo-actions{display:flex;gap:5px;flex-wrap:wrap;margin:5px 0}.photo-action{border:0;border-radius:5px;padding:5px 7px;font-size:11px;font-weight:800;cursor:pointer;background:#f7dfcf;color:#8a3515}.photo-delete{background:#fae4e2;color:#a22c24}@media(max-width:560px){.edit-grid,.team-picker{grid-template-columns:1fr}}</style>
<script>
  document.body.insertAdjacentHTML('beforeend','<div class="edit-modal hidden" id="userEditModal"><div class="edit-box"><div class="edit-top"><h2>Edit OT request</h2><button class="edit-close" onclick="closeUserEdit()">×</button></div><form id="userEditForm"><div class="edit-grid"><label>Requester<input class="edit-input" id="userEditRequester"></label><label>Requester role<input class="edit-input" id="userEditRole"></label><label>Department<input class="edit-input" id="userEditDepartment"></label><label>OT date<input class="edit-input" id="userEditDate" type="date"></label><label class="wide">Production team — tick workers going for OT<div class="team-picker" id="userEditTeam"></div></label><label class="wide">Workers (you can also type names, separated with commas)<input class="edit-input" id="userEditWorkers"></label><label>OT start time<input class="edit-input" id="userEditStart" type="time"></label><label>OT end time<input class="edit-input" id="userEditEnd" type="time"></label><label>Project / job name<input class="edit-input" id="userEditProject"></label><label>Project PIC<input class="edit-input" id="userEditPic"></label></div><button class="edit-save" id="userEditSave">Save changes</button></form></div></div>');
  let productionTeamMembers=[];
  async function loadProductionTeamMembers(){
    const result=await database.from('production_teams').select('department,worker_name').order('worker_name');
    if(!result.error)productionTeamMembers=result.data||[];
  }
  function renderUserEditTeam(department,selectedWorkers){
    const workers=productionTeamMembers.filter(member=>member.department===department).map(member=>member.worker_name);
    const names=[...new Set([...workers,...selectedWorkers])];
    const picker=document.getElementById('userEditTeam');
    picker.innerHTML=names.length?names.map(name=>'<label><input class="user-edit-worker-choice" type="checkbox" value="'+safe(name)+'"'+(selectedWorkers.includes(name)?' checked':'')+'> '+safe(name)+'</label>').join(''):'<span class="empty">No saved team for this department. Type worker names below.</span>';
    picker.querySelectorAll('.user-edit-worker-choice').forEach(input=>input.onchange=()=>{document.getElementById('userEditWorkers').value=[...picker.querySelectorAll('.user-edit-worker-choice:checked')].map(choice=>choice.value).join(', ');});
  }
  window.editUserRequest=async function(id){
    const item=dashboardRequests.find(request=>request.id===id);if(!item)return;
    await loadProductionTeamMembers();
    document.getElementById('userEditModal').dataset.requestId=String(id);const times=(item.timeline||'').split(' - ');
    document.getElementById('userEditRequester').value=item.requester||'';
    document.getElementById('userEditRole').value=item.requester_role||'';
    document.getElementById('userEditDepartment').value=item.department||'';
    document.getElementById('userEditDate').value=item.ot_date||'';
    document.getElementById('userEditWorkers').value=(item.workers||[]).join(', ');
    document.getElementById('userEditStart').value=times[0]||'';
    document.getElementById('userEditEnd').value=times[1]||'';
    document.getElementById('userEditProject').value=item.project_name||'';
    document.getElementById('userEditPic').value=item.project_pic||'';
    renderUserEditTeam(item.department||'',item.workers||[]);
    document.getElementById('userEditModal').classList.remove('hidden');
  };
  window.closeUserEdit=function(){document.getElementById('userEditModal').classList.add('hidden');};
  document.getElementById('userEditDepartment').onchange=function(){renderUserEditTeam(this.value,document.getElementById('userEditWorkers').value.split(',').map(name=>name.trim()).filter(Boolean));};
  document.getElementById('userEditForm').onsubmit=async function(event){
    event.preventDefault();
    const workers=document.getElementById('userEditWorkers').value.split(',').map(name=>name.trim()).filter(Boolean);
    const date=document.getElementById('userEditDate').value,start=document.getElementById('userEditStart').value,end=document.getElementById('userEditEnd').value;
    if(!workers.length||!date||!start||!end){alert('Enter workers, OT date, start time, and end time.');return;}
    const requestId=document.getElementById('userEditModal').dataset.requestId;
    if(!requestId){alert('Cannot find this OT request. Close the form and press Edit again.');return;}
    const button=document.getElementById('userEditSave');button.disabled=true;button.textContent='Saving...';
    const update={requester:document.getElementById('userEditRequester').value.trim(),requester_role:document.getElementById('userEditRole').value.trim(),department:document.getElementById('userEditDepartment').value.trim(),workers,ot_date:date,timeline:start+' - '+end,project_name:document.getElementById('userEditProject').value.trim(),project_pic:document.getElementById('userEditPic').value.trim()};
    const result=await database.from('production_ot_requests').update(update).eq('id',requestId);
    if(result.error){alert(result.error.message);button.disabled=false;button.textContent='Save changes';return;}
    closeUserEdit();await loadDashboard();button.disabled=false;button.textContent='Save changes';
  };
  const photoStoragePath=url=>{const marker='/storage/v1/object/public/production-ot-photos/';const position=String(url||'').indexOf(marker);return position===-1?'':decodeURIComponent(String(url).slice(position+marker.length));};
  async function uploadReplacementPhoto(requestId,file){
    if(!file||!file.type.startsWith('image/'))throw new Error('Please select an image file.');
    if(file.size>5*1024*1024)throw new Error('Each photo must be smaller than 5 MB.');
    const fileName=requestId+'/'+Date.now()+'-'+file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
    const upload=await database.storage.from('production-ot-photos').upload(fileName,file);
    if(upload.error)throw upload.error;
    return database.storage.from('production-ot-photos').getPublicUrl(fileName).data.publicUrl;
  }
  window.replaceUserPhoto=async function(requestId,index,input){
    const file=input.files&&input.files[0];if(!file)return;
    const request=dashboardRequests.find(item=>item.id===requestId);if(!request)return;
    try{
      const newUrl=await uploadReplacementPhoto(requestId,file),urls=[...(request.photo_urls||[])],oldUrl=urls[index];urls[index]=newUrl;
      const result=await database.from('production_ot_requests').update({photo_urls:urls}).eq('id',requestId);if(result.error)throw result.error;
      const oldPath=photoStoragePath(oldUrl);if(oldPath)await database.storage.from('production-ot-photos').remove([oldPath]);
      await loadDashboard();
    }catch(error){alert(error.message||'Cannot replace photo.');}finally{input.value='';}
  };
  window.deleteUserPhoto=async function(requestId,index){
    const request=dashboardRequests.find(item=>item.id===requestId);if(!request||!confirm('Delete this photo?'))return;
    const urls=[...(request.photo_urls||[])],oldUrl=urls[index];urls.splice(index,1);
    const result=await database.from('production_ot_requests').update({photo_urls:urls}).eq('id',requestId);if(result.error){alert(result.error.message);return;}
    const oldPath=photoStoragePath(oldUrl);if(oldPath)await database.storage.from('production-ot-photos').remove([oldPath]);
    await loadDashboard();
  };
  loadDashboard=async function(){
    const result=await database.from('production_ot_requests').select('*').order('submitted_at',{ascending:false});
    const data=result.data,error=result.error;
    if(error){document.getElementById('rows').innerHTML='<tr><td colspan="7" class="empty">Cannot load requests. Please refresh.</td></tr>';return;}
    dashboardRequests=data;document.getElementById('pending').textContent=data.filter(item=>item.status==='Pending').length;document.getElementById('approved').textContent=data.filter(item=>item.status==='Approved').length;document.getElementById('workers').textContent=data.reduce((total,item)=>total+(item.workers||[]).length,0);
    document.querySelector('.card thead').innerHTML='<tr><th>Requester</th><th>Department</th><th>Workers</th><th>Status</th><th>Take / upload photo</th><th>Photos</th><th>Edit details</th></tr>';
    document.getElementById('rows').innerHTML=data.length?data.map(item=>{const photos=item.photo_urls||[],inputId='photo-'+item.id,photoLinks=photos.length?photos.map((url,index)=>'<div><a href="'+url+'" target="_blank">Photo '+(index+1)+'</a><div class="photo-actions"><label class="photo-action" for="'+inputId+'-replace-'+index+'">Replace</label><input class="photo-input" id="'+inputId+'-replace-'+index+'" type="file" accept="image/*" capture="environment" onchange="replaceUserPhoto('+item.id+','+index+',this)"><button class="photo-action photo-delete" onclick="deleteUserPhoto('+item.id+','+index+')">Delete</button></div></div>').join(''):'No photos yet';return '<tr><td>'+safe(item.requester)+'</td><td>'+safe(item.department)+'</td><td>'+safe((item.workers||[]).join(', '))+'</td><td>'+badge(item.status)+'</td><td><label class="photo-button" for="'+inputId+'-camera">📷 Take photo</label><input class="photo-input" id="'+inputId+'-camera" type="file" accept="image/*" capture="environment" onchange="uploadPhotos('+item.id+',this)"><label class="photo-button gallery-button" for="'+inputId+'-gallery">🖼 Upload photo</label><input class="photo-input" id="'+inputId+'-gallery" type="file" accept="image/*" onchange="uploadPhotos('+item.id+',this)"></td><td>'+photoLinks+'</td><td><button class="photo-button" onclick="editUserRequest('+item.id+')">Edit</button></td></tr>';}).join(''):'<tr><td colspan="7" class="empty">No production OT requests yet.</td></tr>';
  };
  loadDashboard();
</script>

<style>

</style>
<script>
  let userManagedTeam=[];
  document.body.insertAdjacentHTML('beforeend','<div class="team-manager hidden" id="userTeamManager"><div class="team-manager-box"><div class="team-manager-top"><h2>Manage production team</h2><button class="team-manager-close" onclick="closeUserTeamManager()">×</button></div><p class="muted">Add a new worker or remove a worker from a production department.</p><div class="team-manager-field"><label for="userTeamDepartment">Department</label><select id="userTeamDepartment" onchange="renderUserManagedMembers()"></select></div><div class="team-manager-field"><label for="userTeamName">New worker name</label><input id="userTeamName" placeholder="Enter worker name"></div><button class="team-manager-add" onclick="addUserTeamMember()">+ Add worker</button><div class="team-members" id="userTeamMembers"></div></div></div>');
  async function loadUserManagedTeam(){
    const result=await database.from('production_teams').select('id,department,worker_name').order('department').order('worker_name');
    if(result.error){alert(result.error.message);return false;}
    userManagedTeam=result.data||[];
    return true;
  }
  window.openUserTeamManager=async function(){
    if(!await loadUserManagedTeam())return;
    const select=document.getElementById('userTeamDepartment'),current=select.value;
    const departments=[...new Set(userManagedTeam.map(member=>member.department))].sort((a,b)=>a.localeCompare(b));
    select.innerHTML=departments.length?departments.map(department=>'<option value="'+safe(department)+'">'+safe(department)+'</option>').join(''):'<option value="">No department found</option>';
    if(departments.includes(current))select.value=current;
    renderUserManagedMembers();document.getElementById('userTeamManager').classList.remove('hidden');
  };
  window.closeUserTeamManager=function(){document.getElementById('userTeamManager').classList.add('hidden');};
  window.renderUserManagedMembers=function(){
    const department=document.getElementById('userTeamDepartment').value,members=userManagedTeam.filter(member=>member.department===department);
    document.getElementById('userTeamMembers').innerHTML=members.length?members.map(member=>'<div class="team-member"><span>'+safe(member.worker_name)+'</span><button onclick="removeUserTeamMember('+member.id+')">Remove</button></div>').join(''):'<div class="empty">No workers in this department yet.</div>';
  };
  window.addUserTeamMember=async function(){
    const department=document.getElementById('userTeamDepartment').value,name=document.getElementById('userTeamName').value.trim();
    if(!department||!name){alert('Choose a department and enter the worker name.');return;}
    if(userManagedTeam.some(member=>member.department===department&&member.worker_name.toLowerCase()===name.toLowerCase())){alert('This worker is already in the team.');return;}
    const result=await database.from('production_teams').insert({department,worker_name:name});
    if(result.error){alert(result.error.message);return;}
    document.getElementById('userTeamName').value='';await loadUserManagedTeam();renderUserManagedMembers();
  };
  window.removeUserTeamMember=async function(id){
    const member=userManagedTeam.find(item=>item.id===id);if(!member||!confirm('Remove '+member.worker_name+' from this team?'))return;
    const result=await database.from('production_teams').delete().eq('id',id);
    if(result.error){alert(result.error.message);return;}
    await loadUserManagedTeam();renderUserManagedMembers();
  };
</script>
